<svg width="480" height="480" viewBox="0 0 480 480" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>Neruppu Logo</title>
  <desc>Split logo — left half solid mechanical gear with watchful eye, right half technical schematic of the same form.</desc>

  <defs>
    <clipPath id="left-clip">
      <rect x="0" y="0" width="240" height="480"/>
    </clipPath>
    <clipPath id="right-clip">
      <rect x="240" y="0" width="240" height="480"/>
    </clipPath>
  </defs>

  <!-- ═══════════════════════════════════════════
       LEFT HALF — SOLID MECHANICAL
  ════════════════════════════════════════════ -->
  <g clip-path="url(#left-clip)">
    <g transform="translate(240,240)">

      <!-- Gear body (10 teeth, solid dark charcoal) -->
      <path fill="#1c1c1c" stroke="none" d="
        M 0,-148 L 22,-138 L 28,-118
        L 52,-118 L 58,-138
        L 80,-118 L 76,-96
        L 118,-55 L 138,-29
        L 148,0
        L 138,29 L 118,55
        L 76,96 L 80,118
        L 58,138 L 52,118
        L 28,118 L 22,138
        L 0,148
        L -22,138 L -28,118
        L -52,118 L -58,138
        L -80,118 L -76,96
        L -118,55 L -138,29
        L -148,0
        L -138,-29 L -118,-55
        L -76,-96 L -80,-118
        L -58,-138 L -52,-118
        L -28,-118 L -22,-138
        Z"/>

      <!-- Inner ring -->
      <circle r="106" fill="#f0f0f0" stroke="none"/>
      <circle r="106" fill="none" stroke="#1c1c1c" stroke-width="3"/>
      <circle r="94"  fill="none" stroke="#1c1c1c" stroke-width="1" opacity="0.4"/>
      <circle r="82"  fill="none" stroke="#1c1c1c" stroke-width="0.8" opacity="0.2"/>

      <!-- Eye sclera -->
      <ellipse rx="68" ry="42" fill="#f5f5f5" stroke="none"/>

      <!-- Eye lid curves -->
      <path d="M -68,0 Q 0,-44 68,0" fill="none" stroke="#1c1c1c" stroke-width="2"/>
      <path d="M -68,0 Q 0,44 68,0"  fill="none" stroke="#1c1c1c" stroke-width="2"/>

      <!-- Iris -->
      <circle r="36" fill="#d0d0d0" stroke="none"/>
      <circle r="36" fill="none" stroke="#1c1c1c" stroke-width="0.8" opacity="0.3"/>
      <circle r="30" fill="none" stroke="#1c1c1c" stroke-width="0.5" opacity="0.2"/>

      <!-- Pupil -->
      <circle r="20" fill="#111111"/>
      <!-- Pupil highlight -->
      <circle cx="-6" cy="-6" r="5" fill="white" opacity="0.18"/>
      <circle cx="-7" cy="-7" r="2" fill="white" opacity="0.22"/>

    </g>
  </g>

  <!-- ═══════════════════════════════════════════
       RIGHT HALF — SCHEMATIC / BLUEPRINT
  ════════════════════════════════════════════ -->
  <g clip-path="url(#right-clip)">
    <g transform="translate(240,240)">

      <!-- Engineering grid -->
      <line x1="-240" y1="-150" x2="240" y2="-150" stroke="#e8e6e0" stroke-width="0.5"/>
      <line x1="-240" y1="-50"  x2="240" y2="-50"  stroke="#e8e6e0" stroke-width="0.5"/>
      <line x1="-240" y1="50"   x2="240" y2="50"   stroke="#e8e6e0" stroke-width="0.5"/>
      <line x1="-240" y1="150"  x2="240" y2="150"  stroke="#e8e6e0" stroke-width="0.5"/>
      <line x1="0"    y1="-240" x2="0"   y2="240"  stroke="#e8e6e0" stroke-width="0.5"/>
      <line x1="100"  y1="-240" x2="100" y2="240"  stroke="#e8e6e0" stroke-width="0.5"/>
      <line x1="200"  y1="-240" x2="200" y2="240"  stroke="#e8e6e0" stroke-width="0.5"/>

      <!-- Gear outline (right half only) -->
      <path fill="none" stroke="#222222" stroke-width="1.2" d="
        M 0,-148 L 22,-138 L 28,-118
        L 52,-118 L 58,-138
        L 80,-118 L 76,-96
        L 118,-55 L 138,-29
        L 148,0
        L 138,29 L 118,55
        L 76,96 L 80,118
        L 58,138 L 52,118
        L 28,118 L 22,138
        L 0,148"/>

      <!-- Reference circles -->
      <circle r="148" fill="none" stroke="#222" stroke-width="0.7" stroke-dasharray="4 4" opacity="0.3"/>
      <circle r="106" fill="none" stroke="#222" stroke-width="1"/>
      <circle r="94"  fill="none" stroke="#222" stroke-width="0.6" opacity="0.5"/>
      <circle r="68"  fill="none" stroke="#222" stroke-width="0.8" stroke-dasharray="6 3"/>
      <circle r="36"  fill="none" stroke="#222" stroke-width="1"/>
      <circle r="20"  fill="none" stroke="#222" stroke-width="1.5"/>

      <!-- Eye ellipse outline -->
      <ellipse rx="68" ry="42" fill="none" stroke="#222" stroke-width="1"/>

      <!-- Eye lid curves (schematic) -->
      <path d="M -68,0 Q 0,-44 68,0" fill="none" stroke="#222" stroke-width="1" opacity="0.5"/>
      <path d="M -68,0 Q 0,44 68,0"  fill="none" stroke="#222" stroke-width="1" opacity="0.5"/>

      <!-- Crosshair center mark -->
      <circle r="3"  fill="none" stroke="#222" stroke-width="1"/>
      <line x1="-10" y1="0" x2="-3" y2="0" stroke="#222" stroke-width="0.8"/>
      <line x1="3"   y1="0" x2="10" y2="0" stroke="#222" stroke-width="0.8"/>
      <line x1="0" y1="-10" x2="0" y2="-3" stroke="#222" stroke-width="0.8"/>
      <line x1="0"   y1="3" x2="0" y2="10" stroke="#222" stroke-width="0.8"/>

      <!-- Dimension tick lines (no labels) -->
      <line x1="0"   y1="-148" x2="0"   y2="-172" stroke="#bbb" stroke-width="0.7"/>
      <line x1="0"   y1="-172" x2="160" y2="-172" stroke="#bbb" stroke-width="0.7"/>

      <line x1="0"   y1="-106" x2="0"   y2="-122" stroke="#bbb" stroke-width="0.6" opacity="0.8"/>
      <line x1="0"   y1="-122" x2="160" y2="-122" stroke="#bbb" stroke-width="0.6" opacity="0.8"/>

      <line x1="68"  y1="0"    x2="68"  y2="78"   stroke="#bbb" stroke-width="0.6" opacity="0.8"/>
      <line x1="0"   y1="78"   x2="68"  y2="78"   stroke="#bbb" stroke-width="0.6" opacity="0.8"/>

    </g>
  </g>

  <!-- Centre divider line -->
  <line x1="240" y1="60" x2="240" y2="420" stroke="#1c1c1c" stroke-width="1.5"/>

</svg>
